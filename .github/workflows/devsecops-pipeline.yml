name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: go-devsecops-application
  ECS_CLUSTER: go-devsecops-cluster
  ECS_SERVICE: go-devsecops-service
  CONTAINER_NAME: go-devsecops-app

jobs:

  # ────────────────────────────────────────────────
  # STAGE 1: Gitleaks — Secrets scan on repo
  # ────────────────────────────────────────────────
  gitleaks:
    name: Gitleaks Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────────
  # STAGE 2: TruffleHog — Deep secrets scan on git history
  # ────────────────────────────────────────────────
  trufflehog:
    name: TruffleHog Secrets Scan
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          base: ""
          head: ${{ github.ref_name }}
          extra_args: --results=verified

  # ────────────────────────────────────────────────
  # STAGE 3: Semgrep — SAST on Go source code
  # ────────────────────────────────────────────────
  semgrep:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest
    needs: trufflehog
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --config=auto .

  # ────────────────────────────────────────────────
  # STAGE 4: Snyk — SCA on go.mod dependencies
  # ────────────────────────────────────────────────
  snyk:
    name: Snyk SCA Scan
    runs-on: ubuntu-latest
    needs: semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # - name: Set up Go
      #   uses: actions/setup-go@v5
      #   with:
      #     go-version: '1.21'

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/golang@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=go.mod

  # ────────────────────────────────────────────────
  # STAGE 5: Docker Build
  # ────────────────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: snyk
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t go-devsecops-app:${{ github.sha }} .

      - name: Save Docker image as artifact
        run: docker save go-devsecops-app:${{ github.sha }} -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  # ────────────────────────────────────────────────
  # STAGE 6: Trivy — Container image scan
  # ────────────────────────────────────────────────
  trivy:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: go-devsecops-app:${{ github.sha }}
          format: table
          # exit-code: '1'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  # ────────────────────────────────────────────────
  # STAGE 7 & 8: Push to ECR & Deploy to ECS
  # Only runs on push to main (not on PRs)
  # ────────────────────────────────────────────────
  deploy:
    name: Push to ECR & Deploy to ECS
    runs-on: ubuntu-latest
    needs: trivy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Tag and push image to ECR
        id: push-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker tag go-devsecops-app:${{ github.sha }} $IMAGE_URI
          docker push $IMAGE_URI
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Download ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition go-devsecops-task \
            --query taskDefinition > task-definition.json

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.push-image.outputs.image_uri }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true 